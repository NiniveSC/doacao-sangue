<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>

    <link rel="stylesheet" href="sytle.css">

</head>

<body>

    <header>
        <h1>Doação de Sangue</h1>
    </header>

    <h2>Cadastre-se para salvar uma vida!</h2>

    <div class="container">
        <div class="form">
            <form id="formDoacao">
                <input type="text" id="nome" placeholder="Nome Completo" required><br>
                <input type="email" id="email" placeholder="Email" required><br>
                <input type="number" id="idade" placeholder="Idade" required><br>
                <input type="number" id="peso" placeholder="Peso" required><br>
                <label>Tipo Sanguíneo:</label>
                <select id="tipoSanguineo" required>
                    <option value="">Selecione</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select><br>
                <input type="text" id="telefone" placeholder="Telefone" required><br>
                <input type="text" id="cidade" placeholder="Cidade" required><br>
                <input type="text" id="estado" placeholder="Estado" required><br>
                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <div>
            <img src="assects/frase doaão de sangue.jpg" alt="Frase doação de sangue">
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
